{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card p-4">
      <h3 class="fw-bold mb-1"><i class="bi bi-lock-fill text-primary me-2"></i>Login</h3>
      <p class="text-muted mb-4">Sign in with your co-op portal credentials.</p>
      <form method="POST" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
      </form>
      <hr class="my-3">
      <div class="text-center small text-muted">
        <p class="mb-1">New student? <a href="{{ url_for('apply') }}">Apply for co-op</a></p>
        <p class="mb-0">Work supervisor? <a href="{{ url_for('employer_register') }}">Create employer account</a></p>
      </div>
      <div class="alert alert-light border mt-3 mb-0 small">
        <strong>Demo credentials:</strong><br>
        Coordinator: <code>coordinator@coop.com</code> / <code>admin123</code>
      </div>
    </div>
  </div>
</div>
{% endblock %}
