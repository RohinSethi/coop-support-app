{% extends 'base.html' %}
{% block title %}Employer Registration{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card p-4">
      <h3 class="fw-bold mb-1"><i class="bi bi-building-fill text-warning me-2"></i>Employer Registration</h3>
      <p class="text-muted mb-4">Create an account to submit student evaluations.</p>
      <form method="POST" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Your Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="John Smith"
                 value="{{ form_data.get('name','') }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Company / Organization</label>
          <input type="text" name="company" class="form-control" placeholder="Acme Corp"
                 value="{{ form_data.get('company','') }}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Work Email <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" placeholder="supervisor@company.com"
                 value="{{ form_data.get('email','') }}" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
          <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-semibold">
          <i class="bi bi-person-plus me-1"></i>Create Employer Account
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center small text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
  </div>
</div>
{% endblock %}
